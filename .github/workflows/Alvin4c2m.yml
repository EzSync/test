name: "Alvin4c2m Workflow"

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  merge_yaml:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl jq
        # Download yq to handle YAML merging correctly
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    - name: Download and Merge YAML Files
      run: |
        # Download the files
        for i in {1..6}; do
          curl -sL -o "config$i.yaml" "https://www.gitlabip.xyz/Alvin9999/PAC/refs/heads/master/backup/img/1/2/ipp/clash.meta2/$i/config.yaml"
        done

        # Correct Way to Merge: Create a base file and append proxies from others
        # This assumes you want all 'proxies' from all files combined.
        # We take the full structure of config1 and append the proxy lists from 2-6.
        cp config1.yaml alvin4c2m.yaml
        
        for i in {2..6}; do
          echo "Merging proxies from config$i.yaml..."
          # This command appends only the 'proxies' array items to the main file
          yq eval-all 'select(fileIndex == 0).proxies += select(fileIndex == 1).proxies | select(fileIndex == 0)' alvin4c2m.yaml config$i.yaml -i
        done

    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: Merged Clash configurations"
        file_pattern: alvin4c2m.yaml
        commit_user_name: GitHub Action
        commit_user_email: action@github.com
