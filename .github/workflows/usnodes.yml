name: Update Best Nodes

on:
  schedule:
    - cron: '0 0 * * *' # 每天运行一次
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch and Process Nodes
        run: |
          # 1. 获取原始订阅内容并解码
          curl -s "https://cmgitsubs.ezbiz.dynv6.net/sxmzdsh" > raw_subs.txt
          
          # 这里假设原始链接直接返回 Base64 编码的订阅内容
          # 使用 base64 解码获取节点列表
          base64 -d raw_subs.txt > decoded_nodes.txt
          
          # 2. 模拟测速与筛选 (因 GitHub Runner 环境限制，建议调用外部测速 API 或使用轻量脚本)
          # 这里演示逻辑：取前 30 个节点。若需真实测速，需在 runner 中安装 clash 或 xray 核心
          head -n 30 decoded_nodes.txt > top30_raw.txt
          
          # 3. 将结果转回 Base64 格式，以确保其为合法的订阅链接格式
          base64 -w 0 top30_raw.txt > ustop30.txt

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ustop30.txt
          git commit -m "Update top 30 nodes"
          git push
