name: Update Best US Nodes

on:
  schedule:
    - cron: '0 14 * * *' # 北京时间 22:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch and Process Nodes
        run: |
          # 1. 获取并解码
          curl -L -s --max-time 30 "https://cmgitsubs.ezbiz.dynv6.net/sxmzdsh" > raw.txt
          if ! (base64 -d raw.txt > decoded.txt 2>/dev/null); then
             mv raw.txt decoded.txt
          fi

          # 2. 三重精细化过滤逻辑：
          # A. 协议过滤: 只保留 vless, vmess, trojan
          # B. 地理过滤: 强制包含 US, 美国, United States (且排除像 "US-非美国地名" 的干扰)
          # C. 去重: sort -u
          # D. 限制数量: head -n 99
          
          grep -Pi "(vless|vmess|trojan)://.*(US|美国|United States)" decoded.txt \
            | sort -u \
            | head -n 99 > top99_plain.txt

          # 3. 编码回 Base64
          base64 -w 0 top99_plain.txt > ustop99.txt

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -s ustop99.txt ]; then
            git add ustop99.txt
            git commit -m "Update US nodes: VLESS/VMess/Trojan" || echo "No changes"
            git push
          fi
