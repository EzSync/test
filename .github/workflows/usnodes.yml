name: Update Best US Nodes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # 北京时间 22:00

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch and Merge Nodes
        run: |
          urls=(
            "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/v2"
            "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.txt"
            "https://raw.githubusercontent.com/free18/v2ray/main/v.txt"
            "https://raw.githubusercontent.com/ermaozi/get_subscribe/main/subscribe/v2ray.txt"
            "https://mar.haxtop.ggff.net/?sub"
            "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/splitted/trojan.txt"
            "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/Eternity.txt"
            "https://raw.githubusercontent.com/mfuu/v2ray/master/v2ray"
            "https://raw.githubusercontent.com/roosterkid/openproxylist/main/V2RAY_BASE64.txt"
            "https://raw.githubusercontent.com/pachangcheng/mianfeijiedian/main/should.txt"
            "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
            "https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.yml"
            "https://raw.githubusercontent.com/ripaojiedian/freenode/main/sub"
            "https://d.zrf.me/vless-base64"
            "https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta-2.yaml"
            "https://raw.githubusercontent.com/xiaoji235/airport-free/main/v2ray.txt"
          )

          > all_nodes.txt
          
          for url in "${urls[@]}"; do
            echo "Fetching: $url"
            curl -L -s -A "Mozilla/5.0" --max-time 15 "$url" > temp.txt || continue
            
            if [ -s temp.txt ]; then
              if ! (base64 -d temp.txt > decoded.txt 2>/dev/null); then
                 cat temp.txt > decoded.txt
              fi
              cat decoded.txt >> all_nodes.txt
            fi
          done

      - name: Process and Filter
        run: |
          # 过滤逻辑：
          # 1. 必须包含协议 (vless, vmess, trojan)
          # 2. 必须包含地理信息 (US, 美国, United States)
          # 3. 必须包含端口 443
          # 4. 去重并取前 99 个
          grep -Pi "(vless|vmess|trojan)://.*(US|美国|United States).*:443" all_nodes.txt \
            | sort -u \
            | head -n 99 > top99_plain.txt
          
          if [ -s top99_plain.txt ]; then
            base64 -w 0 top99_plain.txt > ustop99.txt
            echo "成功筛选出节点。"
          else
            echo "警告：未找到符合条件的节点，请检查关键词或端口匹配。"
            # 退出码设为 0 以防 Workflow 报错停摆，但会生成空文件以便后续分析
            exit 0 
          fi

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ustop99.txt
          git commit -m "Update nodes at $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
