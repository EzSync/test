name: IPv6Collect_wetest_Geo

on:
  schedule:
    - cron: '35 2,6,10,22 * * *'  # Runs daily at 23:25 UTC
  workflow_dispatch:

jobs:
  update_ipv6_addresses:
    name: Update IPv6 Addresses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Fetch and extract IPv6 addresses
        shell: bash
        run: |
          # Define URLs
          URL1="https://www.wetest.vip/page/cloudflare/address_v6.html"
          URL2="https://www.wetest.vip/page/cloudfront/address_v6.html"

          # Fetch and extract raw IPv6 addresses
          {
            curl -s "$URL1"
            curl -s "$URL2"
          } | grep -oE '([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]|[1-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]|[1-9]){0,1}[0-9])' \
          | sort -u > raw_ipv6.txt

      - name: Geolocate and Format IPv6 addresses
        shell: bash
        run: |
          # Clear the file before writing new data
          > ipv6collect1.txt

          # Process every unique IPv6 found
          while read -r IP; do
            # Fetch country code via ip-api.com
            # Note: ip-api requires the raw IP (no brackets) for the URL
            COUNTRY_CODE=$(curl -s "http://ip-api.com/json/$IP?fields=status,countryCode" | jq -r '.countryCode // "Unknown"')
            
            if [ "$COUNTRY_CODE" == "null" ] || [ "$COUNTRY_CODE" == "" ]; then
              COUNTRY_CODE="Unknown"
            fi

            # Format as [IP]#CODE and append to file
            echo "[${IP}]#${COUNTRY_CODE}" >> ipv6collect1.txt
            
            # Sleep to respect free API rate limits (approx 45 requests per min)
            sleep 1.5
          done < raw_ipv6.txt

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ipv6collect1.txt with country-tagged IPv6 addresses"
          file_pattern: ipv6collect1.txt
          commit_user_name: GitHub Action
          commit_user_email: action@github.com
