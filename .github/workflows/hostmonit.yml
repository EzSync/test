name: Update CloudFlare HostMonit IPs with Real IATA

on:
  schedule:
    - cron: '0 */12 * * *'   # 建议改成每12小时，避免请求过多
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IP 并检测真实 IATA
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import time

          url = "https://stock.hostmonit.com/CloudFlareYes"

          def get_real_colo(ip):
              """通过指定 IP 访问 Cloudflare trace 获取真实 colo"""
              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)
                      context = browser.new_context(
                          proxy={"server": f"http://{ip}:80"},  # 尝试通过该IP
                          user_agent='Mozilla/5.0'
                      )
                      page = context.new_page()
                      page.goto("https://cloudflare.com/cdn-cgi/trace", wait_until="networkidle", timeout=15000)
                      content = page.content()
                      browser.close()
                      
                      colo_match = re.search(r'colo=([A-Z]{3})', content)
                      return colo_match.group(1) if colo_match else "Unknown"
              except:
                  return "Unknown"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_context(user_agent='Mozilla/5.0').new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(8000)
              content = page.content()
              
              # 先提取所有 IP
              ip_pattern = r'(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)'
              ips = sorted(set(re.findall(ip_pattern, content)))
              
              print(f"找到 {len(ips)} 个 IP，开始检测真实 IATA...")

              lines = []
              for i, ip in enumerate(ips[:30]):  # 限制数量，避免超时
                  print(f"[{i+1}/{len(ips)}] 检测 {ip} ...")
                  colo = get_real_colo(ip)
                  lines.append(f"{ip}#{colo}")
                  time.sleep(2)  # 避免请求太频繁

          if not lines:
              print("❌ 未获取到 IP")
              exit(1)

          with open('hostmonit.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')

          print("✅ 完成！前 10 行示例：")
          for line in lines[:10]:
              print(line)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonit.txt 2>/dev/null; then
            echo "IP 列表无变化"
          else
            git add hostmonit.txt
            git commit -m "更新 CloudFlare IP + 真实 IATA ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
