name: Update Hostmonit IP

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP and IATA
        run: |
          # 1. 获取 IPv4 列表 (处理去引号和换行)
          ips=$(curl -s "https://stock.hostmonit.com/CloudFlareYes" | tr -d '"' | tr ',' '\n')
          
          # 清空原有内容
          > hostmonitip.txt
          
          # 2 & 3. 循环获取信息并写入
          for ip in $ips; do
            # 获取位置信息 (使用 ip-api.com)
            # 为了获取 IATA code，我们取城市名前3位并转大写
            resp=$(curl -s "http://ip-api.com/json/$ip?fields=status,city")
            status=$(echo $resp | jq -r '.status')
            
            if [ "$status" == "success" ]; then
              city=$(echo $resp | jq -r '.city' | tr '[:lower:]' '[:upper:]' | cut -c1-3)
              # 如果 city 为空，赋予默认值 XXX
              [ -z "$city" ] && city="XXX"
            else
              city="XXX"
            fi
            
            echo "${ip}#${city}" >> hostmonitip.txt
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          # 检查是否有变更，有变更则提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update hostmonitip.txt at $(date +'%Y-%m-%d %H:%M:%S')" && git push)
