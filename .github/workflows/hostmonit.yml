name: hostmonitip

on:
  schedule:
    # 北京时间23:00 = UTC15:00
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hostmonit-ip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch IPs and IATA
        run: |
          python3 << 'EOF'
          import requests
          import re
          import concurrent.futures

          url = "https://stock.hostmonit.com/CloudFlareYes"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          r = requests.get(url, headers=headers, timeout=30)
          r.raise_for_status()

          ipv4_pattern = re.compile(
              r'\b(?:\d{1,3}\.){3}\d{1,3}\b'
          )

          ips = []
          for line in r.text.splitlines():
              m = ipv4_pattern.search(line)
              if m:
                  ip = m.group(0)
                  if ip not in ips:
                      ips.append(ip)

          def get_iata(ip):
              try:
                  resp = requests.get(
                      "https://speed.cloudflare.com/meta",
                      headers={
                          "Host": "speed.cloudflare.com"
                      },
                      timeout=10,
                      proxies={
                          "http": f"http://{ip}:80",
                          "https": f"http://{ip}:80"
                      }
                  )

                  if resp.ok:
                      data = resp.json()
                      return f"{ip}#{data.get('iata', 'UNK')}"
              except:
                  pass

              return f"{ip}#UNK"

          results = []

          with concurrent.futures.ThreadPoolExecutor(max_workers=20) as executor:
              futures = [executor.submit(get_iata, ip) for ip in ips]

              for future in concurrent.futures.as_completed(futures):
                  results.append(future.result())

          results.sort()

          with open("hostmonitip.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(results))

          print(f"Generated {len(results)} records")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add hostmonitip.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update hostmonitip.txt"
          git push
