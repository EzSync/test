name: Update CloudFlare HostMonit IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IP 并写入文件（带 IATA/Colo）
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          url = "https://stock.hostmonit.com/CloudFlareYes"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              )
              page = context.new_page()
              
              print("正在访问页面...")
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(8000)
              
              content = page.content()
              print(f"页面长度: {len(content)} 字符")
              
              # 提取所有 IPv4
              ip_pattern = r'(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)'
              ips = re.findall(ip_pattern, content)
              unique_ips = sorted(set(ips))
              
              print(f"提取到 {len(unique_ips)} 个唯一 IP")
              
              # 尝试提取 Colo / Location 信息（当前页面大多为 Default）
              colo_matches = re.findall(r'Colo\s*([^\n]+)', content)
              colo = colo_matches[0].strip() if colo_matches else "Default"
              
              print(f"检测到 Colo: {colo}")
              
              # 写入格式: IP#IATA/Colo
              lines = [f"{ip}#{colo}" for ip in unique_ips]
              
              if unique_ips:
                  print("前 5 行示例:")
                  for line in lines[:5]:
                      print(line)

          if not unique_ips:
              print("❌ 未获取到 IP")
              exit(1)

          # 写入文件
          with open('hostmonit.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')

          print(f"✅ 成功写入 {len(unique_ips)} 条记录到 hostmonit.txt")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonit.txt 2>/dev/null; then
            echo "IP 列表无变化"
          else
            git add hostmonit.txt
            git commit -m "更新 CloudFlare 优化 IP 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
