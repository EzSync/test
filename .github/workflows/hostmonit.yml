name: Update Hostmonit IP

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP and IATA
        run: |
          # 获取 IP 列表，添加超时控制
          ips_raw=$(curl -s --max-time 10 "https://stock.hostmonit.com/CloudFlareYes")
          
          # 清理数据：去掉引号，去掉逗号，每行一个
          ips=$(echo "$ips_raw" | tr -d '"' | tr ',' '\n')
          
          # 清空原有内容
          > hostmonitip.txt
          
          for ip in $ips; do
            # 跳过空行
            [ -z "$ip" ] && continue
            
            # 使用 http 接口并限制字段，添加错误重试机制
            # 如果请求失败，默认为 XXX，避免脚本中断
            resp=$(curl -s --max-time 5 "http://ip-api.com/json/$ip?fields=status,city" || echo '{"status":"fail"}')
            
            status=$(echo "$resp" | jq -r '.status' 2>/dev/null || echo "fail")
            
            if [ "$status" == "success" ]; then
              city=$(echo "$resp" | jq -r '.city' | tr '[:lower:]' '[:upper:]' | cut -c1-3)
              [ -z "$city" ] || [ "$city" == "null" ] && city="XXX"
            else
              city="XXX"
              # API 限流时稍微等待，避免连续请求失败
              sleep 1
            fi
            
            echo "${ip}#${city}" >> hostmonitip.txt
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          # 仅在文件有变化时提交，防止无效提交
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push
          fi
