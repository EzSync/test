name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          URL="https://stock.hostmonit.com/CloudFlareYes"
          CONTENT=$(curl -s -L -A "Mozilla/5.0" "$URL")
          
          IP_LIST=$(echo "$CONTENT" | tr -d '[]"' | tr ',' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | sort -u)
          
          if [ -z "$IP_LIST" ]; then
            echo "未提取到 IP，跳过。"
            exit 0
          fi
          
          > hostmonitip.txt
          for IP in $IP_LIST; do
            RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
            if echo "$RES" | grep -q '"status":"success"'; then
              COUNTRY=$(echo "$RES" | sed -n 's/.*"countryCode":"\([^"]*\).*/\1/p')
              echo "${IP}#${COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            sleep 1.5
          done

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 添加修改
          git add hostmonitip.txt
          
          # 检查是否有改动，有改动才提交
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt [skip ci]"
            # 使用 || true 确保即使 push 遇到异常，流程也不会因此报错崩溃
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "没有发现变动，无需推送。"
          fi
