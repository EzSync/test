name: Update CloudFlare HostMonit IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright 和依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IP 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import time

          url = "https://stock.hostmonit.com/CloudFlareYes"

          def get_ips():
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36'
                  )
                  page = context.new_page()
                  
                  print("正在访问页面...")
                  page.goto(url, wait_until="networkidle", timeout=60000)
                  
                  # 等待内容加载
                  time.sleep(8)
                  
                  content = page.content()
                  print(f"页面长度: {len(content)} 字符")
                  
                  # 提取 IP
                  ips = re.findall(r'IP\s+([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})', content)
                  unique_ips = sorted(set(ips))
                  
                  print(f"✅ 提取到 {len(unique_ips)} 个唯一 IP")
                  if unique_ips:
                      print("前 8 个 IP:")
                      for ip in unique_ips[:8]:
                          print(ip)
                  
                  browser.close()
                  return unique_ips

          ips = get_ips()

          if not ips:
              print("❌ 未提取到 IP")
              exit(1)

          with open('hostmonit.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(ips) + '\n')

          print(f"✅ 成功写入 {len(ips)} 个 IP 到 hostmonit.txt")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonit.txt 2>/dev/null; then
            echo "IP 列表无变化"
          else
            git add hostmonit.txt
            git commit -m "更新 CloudFlare 优化 IP 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
