name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          API_URL="https://api.hostmonit.com/get_ips"
          
          # 获取数据
          CONTENT=$(curl -s -L -H "Content-Type: application/json" -X POST -d '{"type":"v4"}' "$API_URL")
          
          # 【调试关键点】将返回内容完整打印到日志中，方便我们查看结构
          echo "API 返回内容预览:"
          echo "$CONTENT" | head -c 1000
          
          # 使用更通用的正则表达式提取所有可能的 IPv4 地址
          # 哪怕 IP 隐藏在复杂的 JSON 结构里，这也能把它抠出来
          IP_LIST=$(echo "$CONTENT" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sort -u)
          
          echo "提取到的 IP 列表:"
          echo "$IP_LIST"
          
          > hostmonitip.txt
          for IP in $IP_LIST; do
            # 过滤掉非 IP 的乱码（例如 2026.06.20 这种日期）
            if [[ "$IP" =~ ^(1[0-9]{2}|2[0-4][0-9]|25[0-5]|[1-9]?[0-9])\.((1[0-9]{2}|2[0-4][0-9]|25[0-5]|[1-9]?[0-9])\.){2}(1[0-9]{2}|2[0-4][0-9]|25[0-5]|[1-9]?[0-9])$ ]]; then
                RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
                COUNTRY=$(echo "$RES" | grep -o '"countryCode":"[^"]*"' | cut -d'"' -f4)
                [ -z "$COUNTRY" ] && COUNTRY="Unknown"
                echo "${IP}#${COUNTRY}" >> hostmonitip.txt
            fi
            sleep 1.0
          done

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push origin HEAD:${{ github.ref_name }} || true
          fi
