name: Update CloudFlare HostMonit IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 获取并写入 IP 列表（带调试信息）
        run: |
          python - << 'EOF'
          import re
          import requests
          import os

          url = "https://stock.hostmonit.com/CloudFlareYes"
          try:
              headers = {'User-Agent': 'Mozilla/5.0'}
              response = requests.get(url, timeout=20, headers=headers)
              response.raise_for_status()
              text = response.text

              print(f"页面长度: {len(text)} 字符")

              # 更稳健的提取方式（支持多种格式）
              ips = re.findall(r'(?:IP|IP:)\s*([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})', text)
              unique_ips = sorted(set(ips))

              print(f"✅ 提取到 {len(unique_ips)} 个唯一 IPv4 地址")
              for ip in unique_ips[:10]:   # 只打印前10个用于调试
                  print(ip)

              if not unique_ips:
                  print("❌ 未提取到IP，输出页面前200字符调试：")
                  print(text[:200])
                  exit(1)

              # 写入文件（根目录）
              with open('hostmonit.txt', 'w', encoding='utf-8') as f:
                  for ip in unique_ips:
                      f.write(ip + '\n')
              
              print("✅ hostmonit.txt 写入完成")
          except Exception as e:
              print(f"❌ 错误: {e}")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonit.txt; then
            echo "IP 列表无变化"
          else
            git add hostmonit.txt
            git commit -m "更新 CloudFlare 优化 IP 列表 ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
