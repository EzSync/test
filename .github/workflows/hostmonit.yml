name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          set +e
          URL="https://stock.hostmonit.com/CloudFlareYes"
          
          # 1. 获取并输出原始数据到日志（这样我们就能看到到底拿到了什么）
          CONTENT=$(curl -s -L -A "Mozilla/5.0" "$URL")
          echo "原始数据片段: ${CONTENT:0:100}" 
          
          # 2. 宽容处理：清理常见字符后，直接查找所有符合 IPv4 模式的内容
          # 之前的问题可能是 tr 或 grep 的正则导致数据丢失，这里直接用 grep -oE
          IP_LIST=$(echo "$CONTENT" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sort -u)
          
          echo "提取到的 IP 数量: $(echo "$IP_LIST" | wc -l)"
          
          if [ -z "$IP_LIST" ]; then
            echo "错误: 未能解析出 IP 地址，请检查数据源格式。"
            exit 0
          fi
          
          > hostmonitip.txt
          for IP in $IP_LIST; do
            # 增加一个校验，排除掉无效的数字组合（如 999.999.999.999）
            if [[ $IP =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
                RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
                COUNTRY=$(echo "$RES" | sed -n 's/.*"countryCode":"\([^"]*\).*/\1/p')
                [ -z "$COUNTRY" ] && COUNTRY="Unknown"
                echo "${IP}#${COUNTRY}" >> hostmonitip.txt
                sleep 1.0
            fi
          done

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push origin HEAD:main || git push origin HEAD:master
          else
            echo "无变化。"
          fi
