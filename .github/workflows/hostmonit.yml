name: Update Hostmonit IP

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP and IATA
        run: |
          # 增加 User-Agent 模拟浏览器，避免被拦截返回 HTML
          # 增加 grep 过滤，确保提取的是 IP 格式内容
          ips_raw=$(curl -s -H "User-Agent: Mozilla/5.0" "https://stock.hostmonit.com/CloudFlareYes")
          
          # 清理：只提取包含数字和点的行（匹配IPv4格式），去除多余符号
          # 过滤掉 HTML 标签、脚本代码等干扰项
          ips=$(echo "$ips_raw" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sort -u)
          
          > hostmonitip.txt
          
          for ip in $ips; do
            # 获取位置信息，如果失败则返回 XXX
            # 增加一个重试逻辑，防止单次请求失败
            resp=$(curl -s --max-time 5 "http://ip-api.com/json/$ip?fields=status,city")
            status=$(echo "$resp" | jq -r '.status' 2>/dev/null || echo "fail")
            
            if [ "$status" == "success" ]; then
              city=$(echo "$resp" | jq -r '.city' | tr '[:lower:]' '[:upper:]' | cut -c1-3)
              [ -z "$city" ] || [ "$city" == "null" ] && city="XXX"
            else
              city="XXX"
              sleep 0.5 # 避免过于频繁触发限流
            fi
            
            echo "${ip}#${city}" >> hostmonitip.txt
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push
          fi
