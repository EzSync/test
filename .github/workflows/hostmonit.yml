name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          # 该网站需要较完整的请求头才能返回带有数据的页面
          URL="https://stock.hostmonit.com/CloudFlareYes"
          
          # 使用 curl 获取完整 HTML 页面
          CONTENT=$(curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "$URL")
          
          # 核心修复：直接从 HTML 的文本中匹配所有 IP 格式字符串
          # 即使页面包含 JS 或其他标签，grep -oE 也会提取出所有符合 x.x.x.x 的片段
          IP_LIST=$(echo "$CONTENT" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sort -u)
          
          # 过滤掉非 IP 的乱码（例如 2026.06.19 这种日期也被识别为 IP，需过滤）
          FILTERED_IP_LIST=$(echo "$IP_LIST" | awk '$1 ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && $1 !~ /^(20|202)[0-9]\./')
          
          if [ -z "$FILTERED_IP_LIST" ]; then
            echo "未提取到 IP，数据源可能已完全加密。"
            exit 0
          fi
          
          > hostmonitip.txt
          for IP in $FILTERED_IP_LIST; do
            # 查询 IP 信息
            RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
            
            # 使用简单的字符串匹配，无需 jq
            if [[ "$RES" == *"success"* ]]; then
              COUNTRY=$(echo "$RES" | grep -o '"countryCode":"[^"]*"' | cut -d'"' -f4)
              [ -z "$COUNTRY" ] && COUNTRY="Unknown"
              echo "${IP}#${COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            sleep 1.5
          done

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push origin HEAD:${{ github.ref_name }} || true
          fi
