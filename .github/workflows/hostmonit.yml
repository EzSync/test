- name: Fetch, Extract, and Geolocate IPs
        id: fetch_ips
        shell: bash
        run: |
          # 1. Fetch data safely. Using || true to prevent the script from exiting on curl failure
          URL="https://stock.hostmonit.com/CloudFlareYes"
          echo "Fetching from $URL..."
          CONTENT=$(curl -s -L -A "Mozilla/5.0" "$URL" || echo "")
          
          # 2. Basic validation
          if [ ${#CONTENT} -lt 10 ]; then
            echo "Error: Failed to fetch data or content is too short. Status code: $?"
            # We exit 0 here to stop the workflow gracefully if the API is down
            exit 0
          fi
          
          # 3. Clean JSON format and extract IPs
          # We force a subshell to process the cleaning safely
          IP_LIST=$(echo "$CONTENT" | tr -d '[]"' | tr ',' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | sort -u)
          
          > hostmonitip.txt
          
          # 4. Loop through each IP
          for IP in $IP_LIST; do
            echo "Processing $IP..."
            
            # Fetch with a clear timeout and error suppression
            RESPONSE=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
            
            # Use a robust way to get values from JSON
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "fail"')
            
            if [ "$STATUS" = "success" ]; then
              REG_COUNTRY=$(echo "$RESPONSE" | jq -r '.countryCode // "Unknown"')
              echo "${IP}#${REG_COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            
            sleep 1.5
          done
