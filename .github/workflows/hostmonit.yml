name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'  # Runs daily at 23:00 UTC
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Fetch, Extract, and Geolocate IPs
        id: fetch_ips
        shell: bash
        run: |
          # Fetch from the specified URL
          # The API returns a JSON array, so we clean it to extract IPs
          URL="https://stock.hostmonit.com/CloudFlareYes"
          CONTENT=$(curl -s "$URL")
          
          # Clean JSON format and extract IPs
          # Removes brackets, quotes, and replaces commas with newlines
          IP_LIST=$(echo "$CONTENT" | tr -d '[]"' | tr ',' '\n' | sort -u)
          
          # Clear the file
          > hostmonitip.txt
          
          # Loop through each IP
          for IP in $IP_LIST; do
            # Skip empty lines
            [ -z "$IP" ] && continue
            
            # Fetch the countryCode
            RESPONSE=$(curl -s "http://ip-api.com/json/$IP?fields=status,countryCode")
            STATUS=$(echo "$RESPONSE" | jq -r '.status')
            
            if [ "$STATUS" = "success" ]; then
              REG_COUNTRY=$(echo "$RESPONSE" | jq -r '.countryCode')
              echo "${IP}#${REG_COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            
            # 1.5s delay to stay under 45 requests/minute
            sleep 1.5
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update hostmonitip.txt with Registered Country Codes"
          file_pattern: hostmonitip.txt
          commit_user_name: GitHub Action
          commit_user_email: action@github.com
