name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          # 关闭 set -e，确保即使某条命令出错也不直接退出
          set +e
          
          echo "Step 1: Fetching data..."
          URL="https://stock.hostmonit.com/CloudFlareYes"
          CONTENT=$(curl -s -L -A "Mozilla/5.0" "$URL")
          if [ $? -ne 0 ]; then echo "Curl failed"; exit 0; fi
          
          echo "Step 2: Processing..."
          IP_LIST=$(echo "$CONTENT" | tr -d '[]"' | tr ',' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | sort -u)
          
          > hostmonitip.txt
          for IP in $IP_LIST; do
            RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
            if echo "$RES" | grep -q '"status":"success"'; then
              COUNTRY=$(echo "$RES" | sed -n 's/.*"countryCode":"\([^"]*\).*/\1/p')
              echo "${IP}#${COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            sleep 1.5
          done

      - name: Commit and Push
        shell: bash
        run: |
          set +e
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add hostmonitip.txt
          
          # 检查变更
          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi
          
          echo "Changes detected, committing..."
          git commit -m "Update hostmonitip.txt [skip ci]"
          
          git push origin HEAD:main
          if [ $? -ne 0 ]; then
            echo "Git push failed. Check branch protection settings."
            exit 0
          fi
