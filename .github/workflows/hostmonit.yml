name: Update Hostmonit IP

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP and IATA
        run: |
          # 1. 使用完整的请求头模拟浏览器，防止被拦截
          # 2. 直接将 JSON 解析为数组循环
          ips=$(curl -s -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Referer: https://hostmonit.com/" \
            "https://stock.hostmonit.com/CloudFlareYes" | jq -r '.[]')
          
          if [ -z "$ips" ]; then
            echo "Error: 未能获取到IP数据，请检查接口是否变更。"
            exit 1
          fi
          
          > hostmonitip.txt
          
          for ip in $ips; do
            # 获取位置信息
            resp=$(curl -s --max-time 5 "http://ip-api.com/json/$ip?fields=status,city")
            status=$(echo "$resp" | jq -r '.status' 2>/dev/null || echo "fail")
            
            if [ "$status" == "success" ]; then
              city=$(echo "$resp" | jq -r '.city' | tr '[:lower:]' '[:upper:]' | cut -c1-3)
              [ -z "$city" ] || [ "$city" == "null" ] && city="XXX"
            else
              city="XXX"
            fi
            
            echo "${ip}#${city}" >> hostmonitip.txt
            # 避免对 ip-api 的查询过于频繁
            sleep 0.5
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push
          fi
