name: Update Hostmonit IP

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-ip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP and IATA
        run: |
          # 1. 获取原始数据，不再强制要求为 JSON
          raw_data=$(curl -s -L -H "User-Agent: Mozilla/5.0" "https://stock.hostmonit.com/CloudFlareYes")
          
          # 2. 将数据中的引号、逗号、括号全部清理，转为空格分隔
          # 这样无论它是 JSON 数组 ["1.1.1.1","2.2.2.2"] 还是逗号分隔 1.1.1.1,2.2.2.2 都能兼容
          clean_ips=$(echo "$raw_data" | tr -d '[]"' | tr ',' ' ')
          
          if [ -z "$clean_ips" ]; then
            echo "Error: 未能获取到IP数据。"
            exit 1
          fi
          
          > hostmonitip.txt
          
          # 3. 循环遍历提取的 IP
          for ip in $clean_ips; do
            # 简单校验：确保是符合 ip 格式的字符串 (包含至少一个点)
            if [[ ! "$ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then continue; fi
            
            # 获取位置信息
            resp=$(curl -s --max-time 5 "http://ip-api.com/json/$ip?fields=status,city")
            status=$(echo "$resp" | jq -r '.status' 2>/dev/null || echo "fail")
            
            if [ "$status" == "success" ]; then
              city=$(echo "$resp" | jq -r '.city' | tr '[:lower:]' '[:upper:]' | cut -c1-3)
              [ -z "$city" ] || [ "$city" == "null" ] && city="XXX"
            else
              city="XXX"
            fi
            
            echo "${ip}#${city}" >> hostmonitip.txt
            sleep 0.5
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push
          fi
