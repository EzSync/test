name: hostmonitip

on:
  schedule:
    # 北京时间 23:00 = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch IPs and generate hostmonitip.txt
        run: |
          python3 << 'EOF'
          import requests
          import json

          URL = "https://stock.hostmonit.com/CloudFlareYes"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          r = requests.get(URL, headers=headers, timeout=30)

          print("Status:", r.status_code)
          print("Content-Type:", r.headers.get("Content-Type"))

          ips = []

          # -------------------------
          # 1. try JSON first (most likely correct format)
          # -------------------------
          try:
              data = r.json()
              if isinstance(data, dict) and "data" in data:
                  for item in data["data"]:
                      ip = item.get("ip")
                      if ip:
                          ips.append(ip)
          except Exception as e:
              print("JSON parse failed:", e)

          # -------------------------
          # 2. fallback: regex extract IPv4
          # -------------------------
          if not ips:
              import re
              ips = re.findall(r'\b(?:\d{1,3}\.){3}\d{1,3}\b', r.text)

          ips = list(dict.fromkeys(ips))  # dedupe

          print("IPs found:", len(ips))
          print("Sample:", ips[:10])

          # -------------------------
          # get IATA (Cloudflare colo) more reliable method
          # -------------------------
          def get_iata(ip):
              try:
                  resp = requests.get(
                      f"http://{ip}/cdn-cgi/trace",
                      timeout=5
                  )
                  for line in resp.text.splitlines():
                      if line.startswith("colo="):
                          return line.split("=")[1].strip()
              except:
                  pass
              return "UNK"

          result = []

          for ip in ips:
              iata = get_iata(ip)
              result.append(f"{ip}#{iata}")

          result.sort()

          with open("hostmonitip.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(result))

          print("Generated:", len(result))
          EOF

      - name: Show result
        run: |
          echo "==== hostmonitip.txt ===="
          cat hostmonitip.txt || echo "EMPTY FILE!"

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add hostmonitip.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update hostmonitip.txt"
          git push
