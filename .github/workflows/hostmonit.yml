name: Update CloudFlare HostMonit IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: python -m pip install --upgrade pip requests

      - name: 获取并写入 IP 列表
        run: |
          python - << 'EOF'
          import re
          import requests
          import time

          url = "https://stock.hostmonit.com/CloudFlareYes"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
          }

          def get_ips():
              for attempt in range(3):
                  try:
                      response = requests.get(url, headers=headers, timeout=30)
                      print(f"尝试 {attempt+1}/3 - 状态码: {response.status_code}")
                      print(f"页面长度: {len(response.text)} 字符")

                      if response.status_code != 200:
                          print(response.text[:400])
                          time.sleep(5)
                          continue

                      text = response.text

                      # 最终加强版正则（已适配当前页面）
                      ips = re.findall(r'IP\s+([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})', text)
                      unique_ips = sorted(set(ips))

                      print(f"✅ 提取到 {len(unique_ips)} 个唯一 IP")
                      if unique_ips:
                          print("前 10 个 IP:")
                          for ip in unique_ips[:10]:
                              print(ip)
                          return unique_ips
                      else:
                          print("正则未匹配，页面前200字符预览：")
                          print(repr(text[:200]))

                  except Exception as e:
                      print(f"请求异常: {e}")
                  time.sleep(5)

              return []

          ips = get_ips()

          if not ips:
              print("❌ 未获取到 IP")
              exit(1)

          # 写入文件
          with open('hostmonit.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(ips) + '\n')

          print(f"✅ 成功写入 {len(ips)} 个 IP 到 hostmonit.txt")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonit.txt 2>/dev/null; then
            echo "IP 列表无变化"
          else
            git add hostmonit.txt
            git commit -m "更新 CloudFlare 优化 IP 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
