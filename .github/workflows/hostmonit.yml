name: Update CloudFlare HostMonit IPs

on:
  schedule:
    - cron: '0 */6 * * *'     # 每6小时自动运行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 获取最新 CloudFlare IPv4 并写入文件
        run: |
          python - << 'EOF'
          import re
          import requests
          import os

          url = "https://stock.hostmonit.com/CloudFlareYes"
          try:
              response = requests.get(url, timeout=15)
              response.raise_for_status()
              text = response.text

              # 提取所有 IPv4
              ips = re.findall(r"IP\s+([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)", text)
              unique_ips = sorted(set(ips))

              print(f"获取到 {len(unique_ips)} 个唯一 IPv4 地址")

              # 写入文件
              os.makedirs('test', exist_ok=True)
              with open('test/hostmonit.txt', 'w', encoding='utf-8') as f:
                  for ip in unique_ips:
                      f.write(ip + '\n')
              
              print("hostmonit.txt 更新完成")
          except Exception as e:
              print(f"错误: {e}")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [[ -n $(git status --porcelain test/hostmonit.txt) ]]; then
            git add test/hostmonit.txt
            git commit -m "更新 CloudFlare 优化 IP 列表 (自动更新)"
            git push
            echo "✅ 已提交更新"
          else
            echo "IP 列表无变化，无需提交"
          fi
