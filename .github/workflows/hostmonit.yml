name: Fetch IPv4 with Registered Country Code

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update IP List
        shell: bash
        run: |
          # 核心修改：使用该站点的后端 API 数据源，这是真实存放 IP 的地方
          API_URL="https://api.hostmonit.com/get_ips"
          
          echo "Fetching from $API_URL..."
          # 获取 JSON 数据
          CONTENT=$(curl -s -L -H "Content-Type: application/json" -X POST -d '{"type":"v4"}' "$API_URL")
          
          # 检查 API 是否正常返回
          if [ -z "$CONTENT" ] || [[ "$CONTENT" != *"ip"* ]]; then
             echo "Error: 无法从 API 获取数据，返回内容: $CONTENT"
             exit 0
          fi
          
          # 使用 grep 提取所有 IP
          IP_LIST=$(echo "$CONTENT" | grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sort -u)
          
          > hostmonitip.txt
          for IP in $IP_LIST; do
            # 查询位置
            RES=$(curl -s --max-time 5 "http://ip-api.com/json/$IP?fields=status,countryCode")
            
            # 使用简单的提取方法，避免依赖 jq 的安装版本
            if [[ "$RES" == *"success"* ]]; then
              COUNTRY=$(echo "$RES" | grep -o '"countryCode":"[^"]*"' | cut -d'"' -f4)
              echo "${IP}#${COUNTRY}" >> hostmonitip.txt
            else
              echo "${IP}#Unknown" >> hostmonitip.txt
            fi
            sleep 1.5
          done

      - name: Commit and Push
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hostmonitip.txt
          # 仅在有改动时提交
          if ! git diff --cached --quiet; then
            git commit -m "Update hostmonitip.txt"
            git push origin HEAD:${{ github.ref_name }} || true
          else
            echo "没有更新。"
          fi
