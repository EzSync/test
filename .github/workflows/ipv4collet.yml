name: Fetch IPv4 with IATA GeoLocation

on:
  schedule:
    - cron: '5 2,6,10,22 * * *'  # Runs daily at 23:05 UTC
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Fetch, Extract, and Geolocate IPs
        id: fetch_ips
        shell: bash
        run: |
          # Define the URLs
          URL1="https://www.wetest.vip/page/cloudflare/address_v4.html"
          URL2="https://ip.164746.xyz/"

          # Fetch content and extract unique IPv4 addresses
          CONTENT1=$(curl -s "$URL1")
          CONTENT2=$(curl -s "$URL2")
          IP_LIST=$(echo -e "$CONTENT1\n$CONTENT2" | grep -oP '\b(?:\d{1,3}\.){3}\d{1,3}\b' | sort -u)

          # Clear the file before writing
          > ipv4collect.txt

          # Loop through each IP
          for IP in $IP_LIST; do
            # Fetch city name using ip-api.com
            CITY=$(curl -s "http://ip-api.com/json/$IP?fields=city" | jq -r '.city // "Unknown"')
            
            # Map common cities to IATA codes
            case "$CITY" in
              "San Jose") IATA="SJC" ;;
              "Los Angeles") IATA="LAX" ;;
              "Seattle") IATA="SEA" ;;
              "Chicago") IATA="ORD" ;;
              "New York") IATA="JFK" ;;
              "Newark") IATA="EWR" ;;
              "Ashburn") IATA="IAD" ;;
              "Tokyo") IATA="NRT" ;;
              "Hong Kong") IATA="HKG" ;;
              "London") IATA="LHR" ;;
              "Frankfurt") IATA="FRA" ;;
              "Paris") IATA="CDG" ;;
              "Budapest") IATA="BUD" ;;
              "Singapore") IATA="SIN" ;;
              "Seoul") IATA="ICN" ;;
              "Unknown") IATA="UNK" ;;
              *) 
                # Fallback: Take first 3 letters of City and make Uppercase
                IATA=$(echo "$CITY" | cut -c 1-3 | tr '[:lower:]' '[:upper:]') 
                ;;
            esac

            echo "${IP}#${IATA}" >> ipv4collect.txt
            
            # Delay to stay under 45 requests/min (free API limit)
            sleep 1.5
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ipv4collect.txt with IATA Location Tags"
          file_pattern: ipv4collect.txt
          commit_user_name: GitHub Action
          commit_user_email: action@github.com
