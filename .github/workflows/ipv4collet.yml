name: Fetch IPv4 with GeoLocation

on:
  schedule:
    - cron: '5 2,6,10,22 * * *'  # Runs daily at 23:05 UTC
  workflow_dispatch:

jobs:
  update_ipv4_collect:
    name: Update IPv4 Collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq

      - name: Fetch, Extract, and Geolocate IPs
        id: fetch_ips
        shell: bash
        run: |
          # Define the URLs to monitor
          URL1="https://www.wetest.vip/page/cloudflare/address_v4.html"
          URL2="https://ip.164746.xyz/"

          # Fetch content
          CONTENT1=$(curl -s "$URL1")
          CONTENT2=$(curl -s "$URL2")

          # Extract unique IPv4 addresses
          IP_LIST=$(echo -e "$CONTENT1\n$CONTENT2" | grep -oP '\b(?:\d{1,3}\.){3}\d{1,3}\b' | sort -u)

          # Clear the file before writing
          > ipv4collect.txt

          # Loop through each IP and find its country code
          for IP in $IP_LIST; do
            # Fetch country code (e.g., US, JP, CN) using ip-api.com
            # We use jq to parse the JSON response
            COUNTRY_CODE=$(curl -s "http://ip-api.com/json/$IP?fields=status,countryCode" | jq -r '.countryCode // "Unknown"')
            
            if [ "$COUNTRY_CODE" != "null" ] && [ "$COUNTRY_CODE" != "Unknown" ]; then
              echo "${IP}#${COUNTRY_CODE}" >> ipv4collect.txt
            else
              echo "${IP}#Unknown" >> ipv4collect.txt
            fi
            
            # Optional: Small delay to respect rate limits of free APIs
            sleep 0.2
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ipv4collect.txt with Country Tags"
          file_pattern: ipv4collect.txt
          commit_user_name: GitHub Action
          commit_user_email: action@github.com
