name: HostMonitv4 IPs
on:
  schedule:
    - cron: '35 22,4,10 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IP 并合并更新
        run: |
          python - << 'EOF'
          import os, re
          from playwright.sync_api import sync_playwright

          url, file_path = "https://stock.hostmonit.com/CloudFlareYes", 'hostmonitv4.txt'

          # 1. 抓取新 IP
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_context(user_agent='Mozilla/5.0').new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(8000)
              content = page.content()
              browser.close()

          ip_pattern = r'(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)'
          new_ips = set(ip.split('#')[0] for ip in re.findall(ip_pattern, content))

          # 2. 合并去重
          old_ips = set()
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  for line in f:
                      if line.strip(): old_ips.add(line.split('#')[0])

          final_ips = sorted(list(old_ips.union(new_ips)))[-15:]

          # 3. 写入文件
          with open(file_path, 'w', encoding='utf-8') as f:
              for ip in final_ips: f.write(f"{ip}#CF.V4\n")
          
          print(f"✅ 更新完成，当前共有 {len(final_ips)} 个 IP")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonitv4.txt; then
            echo "IP 列表无变化"
          else
            git add hostmonitv4.txt
            git commit -m "更新 CloudFlare IPv4 列表 (共$(wc -l < hostmonitv4.txt)个) ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新至 hostmonitv4.txt"
          fi
