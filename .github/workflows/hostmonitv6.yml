name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              
              # 等待页面 JS 渲染
              page.wait_for_timeout(10000)
              
              # 获取页面所有 .card-value 元素
              elements = page.query_selector_all(".card-value")
              
              ips = []
              for el in elements:
                  text = el.inner_text().strip()
                  # 校验是否为 IPv6 格式
                  if text.count(':') >= 3 and len(text) > 15:
                      ips.append(text)
              
              browser.close()

          if ips:
              # 将所有抓取到的记录写入文件（不去重，保留运营商分类下的完整列表）
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(ips) + '\n')
              print(f"✅ 成功提取并写入 {len(ips)} 条 IPv6 记录")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add hostmonitv6.txt
          
          if git diff --staged --quiet; then
            echo "IPv6 列表无变化，无需提交。"
          else
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 变更已提交至仓库。"
          fi
