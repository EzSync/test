name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import os

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000)
              
              # 关键点：该网站在页面上有翻页功能，且 IP 列表在 table 或类似结构中
              # 我们通过 locator 获取所有包含 IP 特征的元素
              # 观察网页结构，IP 通常在类名为 'ip-address' 或类似的容器中
              # 这里我们使用 XPath 匹配所有看起来像 IPv6 的片段
              elements = page.query_selector_all("*")
              raw_texts = [el.inner_text() for el in elements if el.inner_text() and ":" in el.inner_text()]
              
              ips = []
              for text in raw_texts:
                  # 针对可能被换行符截断的地址进行拼接
                  # 找到所有匹配 IPv6 片段的正则
                  found = re.findall(r'(([0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{1,4})', text)
                  for f in found:
                      ips.append(f[0])
              
              # 此时会得到很多碎片，因为它是拆分显示的
              # 我们需要按出现顺序重新拼接，或者直接使用集合去重
              # 鉴于每个 IP 是 8 段，这里简单处理：只保留长度合理的完整 IP
              unique_ips = sorted(set([ip for ip in ips if ip.count(':') >= 3 and len(ip) > 15]))
              
              browser.close()

          if unique_ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_ips) + '\n')
              print(f"✅ 成功写入 {len(unique_ips)} 个 IPv6")
          else:
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hostmonitv6.txt
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "更新 IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 提交完成"
          fi
