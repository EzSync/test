name: HostMonitv6 IPs

on:
  schedule:
    - cron: '15 23,5,9 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取并更新 IPv6 列表
        run: |
          python - << 'EOF'
          import os
          from playwright.sync_api import sync_playwright
          import re

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          # 1. 获取新抓取的 IP
          new_ips = set()
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000)
              
              elements = page.query_selector_all(".card-value")
              for el in elements:
                  text = el.inner_text().strip()
                  # 为了去重，清理可能存在的括号或后缀
                  clean_ip = text.split('#')[0].strip("[]")
                  if clean_ip.count(':') >= 3 and len(clean_ip) > 15:
                      new_ips.add(clean_ip)
              browser.close()

          # 2. 读取旧 IP
          old_ips = set()
          if os.path.exists(output_path):
              with open(output_path, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if line:
                          # 为了去重，清理可能存在的括号或后缀
                          old_ips.add(line.split('#')[0].strip("[]"))

          # 3. 合并并保持去重
          all_ips = old_ips.union(new_ips)
          
          # 4. 排序并限制数量为 15 个
          sorted_ips = sorted(list(all_ips))
          final_ips = sorted_ips[-15:]

          # 5. 写入文件，检查括号并补全 #CF.V6
          with open(output_path, 'w', encoding='utf-8') as f:
              for ip in final_ips:
                  f.write(f"[{ip}]#CF.V6\n")
          
          print(f"✅ 成功更新，当前文件共有 {len(final_ips)} 个唯一 IPv6")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hostmonitv6.txt
          if git diff --staged --quiet; then
            echo "无变化，无需提交。"
          else
            git commit -m "更新 IPv6 列表 (保持最多15个) ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 提交完成。"
          fi
