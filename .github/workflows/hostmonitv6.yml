name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import json
          import re

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              # 拦截 API 请求
              all_data = []
              def handle_response(response):
                  if "stock.hostmonit.com/api" in response.url: # 替换为实际 API 地址特征
                      try:
                          all_data.append(response.json())
                      except:
                          pass

              page.on("response", handle_response)
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000)
              
              # 如果上面的拦截没拿到，直接抓取页面可见的所有 IP 文本并去重
              # 遍历页面所有符合 IPv6 格式的文本
              content = page.content()
              # 匹配 IPv6
              found = re.findall(r'(([0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{1,4})', content)
              
              ips = {f[0] for f in found if len(f[0]) > 15}
              
              # 强制滚动页面，确保懒加载触发
              page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
              page.wait_for_timeout(5000)
              
              # 再次提取
              content_after = page.content()
              found_after = re.findall(r'(([0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{1,4})', content_after)
              for f in found_after:
                  if len(f[0]) > 15:
                      ips.add(f[0])

              browser.close()

          if ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(sorted(list(ips))) + '\n')
              print(f"✅ 成功提取 {len(ips)} 个唯一 IPv6")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hostmonitv6.txt
          if git diff --staged --quiet; then
            echo "无变化"
          else
            git commit -m "更新 IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 提交完成"
          fi
