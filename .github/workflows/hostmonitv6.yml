name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips-v6:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入 hostmonitv6.txt
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import time

          url = "https://stock.hostmonit.com/CloudFlareYesV6"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox', '--disable-setuid-sandbox'])
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36',
                  viewport={'width': 1920, 'height': 2000}
              )
              page = context.new_page()
              
              print("正在访问页面...")
              page.goto(url, wait_until="domcontentloaded", timeout=90000)
              
              # 极致等待策略
              print("等待动态内容加载...")
              time.sleep(12)
              page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
              time.sleep(8)
              
              for _ in range(4):
                  page.evaluate("window.scrollBy(0, 800)")
                  time.sleep(4)
              
              content = page.content()
              print(f"最终页面长度: {len(content)} 字符")
              
              # 精确匹配页面格式 "IP 2606:xxxx"
              ipv6_pattern = r'IP\s+([0-9a-fA-F]{1,4}(?::[0-9a-fA-F]{1,4}){1,7})'
              matches = re.findall(ipv6_pattern, content)
              
              unique_ips = sorted(set([ip.strip() for ip in matches if ip and len(ip) > 15]))
              
              print(f"✅ 成功提取到 {len(unique_ips)} 个唯一 IPv6")
              if unique_ips:
                  print("前 8 个 IPv6:")
                  for ip in unique_ips[:8]:
                      print(ip)
              else:
                  print("⚠️ 未匹配，页面前 800 字符：")
                  print(repr(content[:800]))

          if not unique_ips:
              print("❌ 未能提取 IPv6")
              exit(1)

          with open('hostmonitv6.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_ips) + '\n')

          print(f"✅ 成功写入 {len(unique_ips)} 条 IPv6 到 hostmonitv6.txt")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonitv6.txt 2>/dev/null; then
            echo "IPv6 列表无变化"
          else
            git add hostmonitv6.txt
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
