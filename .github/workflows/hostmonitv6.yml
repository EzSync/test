name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              
              # 给页面一点加载时间
              page.wait_for_timeout(5000)
              
              # 直接获取所有 class 为 card-value 的元素
              # 这些元素包含了 IP 地址以及其他一些数据（如速度、时间）
              elements = page.query_selector_all(".card-value")
              
              ips = set()
              for el in elements:
                  text = el.inner_text().strip()
                  # IPv6 正则匹配：检查字符串中是否包含 IPv6 地址特征
                  # 只要包含至少 3 个冒号，且看起来像 IPv6 格式
                  if text.count(':') >= 3 and len(text) > 15:
                      # 清理掉可能存在的换行或额外空格
                      clean_ip = re.sub(r'\s+', '', text)
                      ips.add(clean_ip)
              
              unique_ips = sorted(list(ips))
              browser.close()

          if unique_ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_ips) + '\n')
              print(f"✅ 成功提取 {len(unique_ips)} 个 IPv6")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add hostmonitv6.txt
          
          if git diff --staged --quiet; then
            echo "无变化，无需提交。"
          else
            git commit -m "更新 IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 提交完成"
          fi
