name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import os

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000)
              
              # 直接从浏览器提取渲染后的纯文本
              full_text = page.evaluate("document.body.innerText")
              
              # 移除所有空格和换行符，将折行的 IP 还原
              clean_text = re.sub(r'\s+', '', full_text)
              
              # 提取所有长字符且包含冒号的片段
              found_ips = re.findall(r'([0-9a-fA-F:]{15,45})', clean_text)
              
              # 进一步清洗：只保留符合 IPv6 格式特征的地址
              valid_ips = []
              for ip in set(found_ips):
                  # 校验：至少包含 3 个冒号，且字符串不以冒号开头或结尾
                  if ip.count(':') >= 3 and re.match(r'^[0-9a-fA-F:]+$', ip):
                      valid_ips.append(ip)
              
              unique_ips = sorted(valid_ips)
              browser.close()

          if unique_ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_ips) + '\n')
              print(f"✅ 成功提取 {len(unique_ips)} 个 IPv6")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add hostmonitv6.txt
          
          if git diff --staged --quiet; then
            echo "IPv6 列表无变化，无需提交。"
          else
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 变更已提交至仓库。"
          fi
