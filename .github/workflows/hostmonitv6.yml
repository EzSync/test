name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import os

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url, wait_until="networkidle", timeout=60000)
              
              # 延长等待时间，让懒加载内容全部渲染
              page.wait_for_timeout(15000)
              
              # 获取页面完整的 HTML 内容
              html_content = page.content()
              
              # 正则匹配：查找所有看起来像 IPv6 的字符串
              # IPv6 格式：8组十六进制数，允许使用冒号和双冒号压缩
              # 这里使用更广泛的模式以确保捕获所有可能出现的地址格式
              ipv6_pattern = r'(([0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{1,4})'
              
              # 在整个 HTML 中查找
              matches = re.findall(ipv6_pattern, html_content)
              
              # 提取匹配结果并去重
              unique_ips = set()
              for match in matches:
                  ip = match[0]
                  if len(ip) > 15: # 确保长度符合 IPv6 最小长度
                      unique_ips.add(ip)
              
              sorted_ips = sorted(list(unique_ips))
              browser.close()

          if sorted_ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(sorted_ips) + '\n')
              print(f"✅ 成功提取 {len(sorted_ips)} 个 IPv6")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add hostmonitv6.txt
          
          if git diff --staged --quiet; then
            echo "无变化，无需提交。"
          else
            git commit -m "更新 IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 提交完成，共提取 $sorted_ips_count 个地址。"
          fi
