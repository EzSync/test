name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips-v6:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip requests

      - name: 获取 IPv6 并写入 hostmonitv6.txt
        run: |
          python - << 'EOF'
          import re
          import requests

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Referer': 'https://stock.hostmonit.com/',
              'Cache-Control': 'no-cache',
          }

          print("正在请求 IPv6 页面...")
          response = requests.get(url, headers=headers, timeout=30)
          print(f"状态码: {response.status_code}")
          print(f"页面长度: {len(response.text)} 字符")

          content = response.text

          # 强力匹配 "IP " 后面的 IPv6 地址
          ipv6_pattern = r'IP\s+([0-9a-fA-F:]+)'
          matches = re.findall(ipv6_pattern, content)

          unique_ips = sorted(set([ip.strip() for ip in matches if ':' in ip and len(ip) > 15]))

          print(f"✅ 成功提取到 {len(unique_ips)} 个唯一 IPv6 地址")
          if unique_ips:
              print("前 8 个 IPv6 示例:")
              for ip in unique_ips[:8]:
                  print(ip)
          else:
              print("⚠️ 未匹配，页面前 600 字符预览：")
              print(repr(content[:600]))

          if not unique_ips:
              print("❌ 未获取到 IPv6")
              exit(1)

          # 写入文件
          with open('hostmonitv6.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_ips) + '\n')

          print(f"✅ 成功写入 {len(unique_ips)} 条 IPv6 到 hostmonitv6.txt")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonitv6.txt 2>/dev/null; then
            echo "IPv6 列表无变化"
          else
            git add hostmonitv6.txt
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
