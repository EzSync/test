name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入文件
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import os

          url = "https://stock.hostmonit.com/CloudFlareYesV6"
          output_path = "hostmonitv6.txt"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              
              print("正在访问页面...")
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(10000)
              
              # 获取页面文本并移除换行符，将折行的 IP 拼接起来
              content = page.text_content("body")
              content_clean = content.replace('\n', '').replace('\r', '')
              
              # 匹配 IPv6 的正则
              ipv6_pattern = r'([0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{1,4}'
              matches = re.findall(ipv6_pattern, content_clean)
              
              # 过滤掉非 IP 的干扰项，只取长度合理的匹配项
              unique_ips = sorted(set([ip for ip in matches if len(ip) > 15]))
              
              browser.close()

          if unique_ips:
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_ips) + '\n')
              print(f"✅ 成功写入 {len(unique_ips)} 个 IPv6 到 {output_path}")
          else:
              print("❌ 未获取到 IPv6")
              exit(1)
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add hostmonitv6.txt
          
          if git diff --staged --quiet; then
            echo "IPv6 列表无变化，无需提交。"
          else
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 变更已提交至仓库。"
          fi
