name: Update CloudFlare HostMonit IPv6

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-ips-v6:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: 获取 IPv6 并写入 hostmonitv6.txt
        run: |
          python - << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          url = "https://stock.hostmonit.com/CloudFlareYesV6"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              )
              page = context.new_page()
              
              print("正在访问 IPv6 页面...")
              page.goto(url, wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(8000)
              
              content = page.content()
              print(f"页面长度: {len(content)} 字符")
              
              # 简化的可靠 IPv6 正则（专门适配当前页面）
              ipv6_pattern = r'IP\s+([0-9a-fA-F]{1,4}(?::[0-9a-fA-F]{1,4}){1,7})'
              matches = re.findall(ipv6_pattern, content)
              
              # 清理和去重
              unique_ips = sorted(set(matches))
              
              print(f"✅ 成功提取到 {len(unique_ips)} 个唯一 IPv6 地址")
              if unique_ips:
                  print("前 8 个 IPv6 示例:")
                  for ip in unique_ips[:8]:
                      print(ip)

          if not unique_ips:
              print("❌ 未获取到 IPv6 地址，页面前300字符预览：")
              print(repr(content[:300]))
              exit(1)

          # 写入文件
          with open('hostmonitv6.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_ips) + '\n')

          print(f"✅ hostmonitv6.txt 写入完成，共 {len(unique_ips)} 条")
          EOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet hostmonitv6.txt 2>/dev/null; then
            echo "IPv6 列表无变化"
          else
            git add hostmonitv6.txt
            git commit -m "更新 CloudFlare IPv6 列表 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ 已提交更新"
          fi
